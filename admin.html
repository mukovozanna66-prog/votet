<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админ панель</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #0f172a;
  font-family: Arial;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
}

.screen {
  width: 1200px;
  height: 720px;
  background: #0b1226;
  border-radius: 16px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.header {
  text-align: center;
  padding: 10px;
  font-size: 18px;
  background: #111827;
  color: white;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  padding: 10px;
  height: 100%;
  box-sizing: border-box;
}

.box {
  display: flex;
  flex-direction: column;
}

.title {
  text-align: center;
  margin-bottom: 10px;
  color: white;
}

.chart-area {
  flex: 1;
  position: relative;
}

canvas {
  position: absolute;
  inset: 0;
  width: 100% !important;
  height: 100% !important;
}
</style>
</head>

<body>

<div class="screen">

<div class="header">📊 LIVE АДМИН ПАНЕЛЬ</div>

<div class="grid">

  <div class="box">
    <div class="title">ДЮГО</div>
    <div class="chart-area">
      <canvas id="c1"></canvas>
    </div>
  </div>

  <div class="box">
    <div class="title">БУМ</div>
    <div class="chart-area">
      <canvas id="c2"></canvas>
    </div>
  </div>

</div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="firebase.js"></script>

<script>
const leaderColor = "#facc15";
const baseColor1 = "#3b82f6";
const baseColor2 = "#22c55e";

const options = {
  responsive: true,
  maintainAspectRatio: false,
  animation: false,
  plugins: {
    legend: {
      labels: { color: "white" }
    }
  },
  scales: {
    x: { ticks: { color: "white" } },
    y: { ticks: { color: "white" } }
  }
};

const chart1 = new Chart(document.getElementById("c1"), {
  type: "bar",
  data: {
    labels: ["1","2","3","4","5"],
    datasets: [{
      label: "ДЮГО",
      data: [0,0,0,0,0],
      backgroundColor: []
    }]
  },
  options
});

const chart2 = new Chart(document.getElementById("c2"), {
  type: "bar",
  data: {
    labels: ["1","2","3","4","5"],
    datasets: [{
      label: "БУМ",
      data: [0,0,0,0,0],
      backgroundColor: []
    }]
  },
  options
});

function makeColors(data, baseColor) {
  const max = Math.max(...data);
  return data.map(v => (v === max && max > 0 ? leaderColor : baseColor));
}

db.ref("votes").on("value", snap => {
  const data = snap.val() || {};

  const d1 = [0,0,0,0,0];
  const d2 = [0,0,0,0,0];

  if (data.dyugo) {
    Object.values(data.dyugo).forEach(v => d1[v - 1]++);
  }

  if (data.boom) {
    Object.values(data.boom).forEach(v => d2[v - 1]++);
  }

  chart1.data.datasets[0].data = d1;
  chart2.data.datasets[0].data = d2;

  chart1.data.datasets[0].backgroundColor = makeColors(d1, baseColor1);
  chart2.data.datasets[0].backgroundColor = makeColors(d2, baseColor2);

  chart1.update();
  chart2.update();
});
</script>

</body>
</html>
