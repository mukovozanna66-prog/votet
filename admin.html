<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админ панель</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #0f172a;
  font-family: Arial;
  color: white;
  height: 100%;
}

/* центр экрана */
body {
  display: flex;
  justify-content: center;
  align-items: center;
}

/* фиксированное окно */
.screen {
  width: 1100px;
  height: 650px;
  background: #0b1226;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 0 25px rgba(0,0,0,0.6);
  display: flex;
  flex-direction: column;
}

/* верх */
.header {
  text-align: center;
  padding: 12px;
  font-size: 20px;
  background: #111827;
  border-bottom: 1px solid #1f2a44;
}

/* графики */
.content {
  flex: 1;
  display: flex;
  gap: 10px;
  padding: 10px;
  box-sizing: border-box;
}

/* колонки */
.box {
  flex: 1;
  background: #111827;
  border-radius: 12px;
  padding: 10px;
  display: flex;
  flex-direction: column;
}

/* заголовки */
.title {
  text-align: center;
  margin: 5px 0;
}

/* canvas */
canvas {
  flex: 1;
  width: 100% !important;
  height: 100% !important;
}
</style>
</head>

<body>

<div class="screen">

<div class="header">📊 Админ панель (LIVE)</div>

<div class="content">

  <div class="box">
    <div class="title">ДЮГО</div>
    <canvas id="c1"></canvas>
  </div>

  <div class="box">
    <div class="title">БУМ</div>
    <canvas id="c2"></canvas>
  </div>

</div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="firebase.js"></script>

<script>
const chart1 = new Chart(document.getElementById("c1"), {
  type: "bar",
  data: {
    labels: ["1","2","3","4","5"],
    datasets: [{
      label: "ДЮГО",
      data: [0,0,0,0,0],
      backgroundColor: "#3b82f6"
    }]
  }
});

const chart2 = new Chart(document.getElementById("c2"), {
  type: "bar",
  data: {
    labels: ["1","2","3","4","5"],
    datasets: [{
      label: "БУМ",
      data: [0,0,0,0,0],
      backgroundColor: "#22c55e"
    }]
  }
});

db.ref("votes").on("value", snap => {
  const data = snap.val() || {};

  const d1 = [0,0,0,0,0];
  const d2 = [0,0,0,0,0];

  if (data.dyugo) {
    Object.values(data.dyugo).forEach(v => d1[v-1]++);
  }

  if (data.boom) {
    Object.values(data.boom).forEach(v => d2[v-1]++);
  }

  chart1.data.datasets[0].data = d1;
  chart2.data.datasets[0].data = d2;

  chart1.update();
  chart2.update();
});
</script>

</body>
</html>
