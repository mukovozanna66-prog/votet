<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админ панель</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #0f172a;
  font-family: Arial;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}

/* фиксированное окно */
.screen {
  width: 1000px;
  height: 600px;
  background: #0b1226;
  border-radius: 16px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

/* верхняя панель */
.header {
  text-align: center;
  padding: 10px;
  font-size: 18px;
  background: #111827;
  color: white;
}

/* контейнер */
.content {
  display: flex;
  flex: 1;
}

/* колонки */
.box {
  width: 50%;
  display: flex;
  flex-direction: column;
  padding: 10px;
  box-sizing: border-box;
}

/* заголовки категорий */
.title {
  text-align: center;
  margin-bottom: 10px;
  font-size: 16px;
  color: white;
}

/* графики */
canvas {
  width: 100% !important;
  height: 100% !important;
}
</style>
</head>

<body>

<div class="screen">

<div class="header">📊 LIVE АДМИН ПАНЕЛЬ</div>

<div class="content">

  <div class="box">
    <div class="title">ДЮГО</div>
    <canvas id="c1"></canvas>
  </div>

  <div class="box">
    <div class="title">БУМ</div>
    <canvas id="c2"></canvas>
  </div>

</div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="firebase.js"></script>

<script>
const chartOptions = {
  responsive: true,
  maintainAspectRatio: false,
  plugins: {
    legend: {
      labels: {
        color: "white",
        font: {
          size: 14
        }
      }
    }
  },
  scales: {
    x: {
      ticks: {
        color: "white",
        font: { size: 14 }
      }
    },
    y: {
      ticks: {
        color: "white",
        font: { size: 14 }
      }
    }
  }
};

const chart1 = new Chart(document.getElementById("c1"), {
  type: "bar",
  data: {
    labels: ["1","2","3","4","5"],
    datasets: [{
      label: "ДЮГО",
      data: [0,0,0,0,0],
      backgroundColor: "#3b82f6"
    }]
  },
  options: chartOptions
});

const chart2 = new Chart(document.getElementById("c2"), {
  type: "bar",
  data: {
    labels: ["1","2","3","4","5"],
    datasets: [{
      label: "БУМ",
      data: [0,0,0,0,0],
      backgroundColor: "#22c55e"
    }]
  },
  options: chartOptions
});

db.ref("votes").on("value", snap => {
  const data = snap.val() || {};

  const d1 = [0,0,0,0,0];
  const d2 = [0,0,0,0,0];

  if (data.dyugo) {
    Object.values(data.dyugo).forEach(v => {
      const i = parseInt(v) - 1;
      if (d1[i] !== undefined) d1[i]++;
    });
  }

  if (data.boom) {
    Object.values(data.boom).forEach(v => {
      const i = parseInt(v) - 1;
      if (d2[i] !== undefined) d2[i]++;
    });
  }

  chart1.data.datasets[0].data = d1;
  chart2.data.datasets[0].data = d2;

  chart1.update();
  chart2.update();
});
</script>

</body>
</html>
