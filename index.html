<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ТАЄМНЕ ГОЛОСУВАННЯ</title>

<style>

body{
    margin:0;
    padding:20px;
    font-family:Arial;
    background:
    linear-gradient(
      rgba(0,0,0,0.6),
      rgba(0,0,0,0.6)
    ),
    url("fon.png") center/cover no-repeat fixed;

    color:white;
}

.container{
    max-width:700px;
    margin:auto;
}

.title{
    text-align:center;
    font-size:32px;
    font-weight:bold;
    margin-bottom:30px;
}

.block{
    background:rgba(17,24,39,0.8);
    padding:20px;
    border-radius:20px;
    margin-bottom:25px;
    backdrop-filter:blur(5px);
}

.block h2{
    text-align:center;
    margin-top:0;
    margin-bottom:20px;
}

.buttons{
    display:flex;
    flex-direction:column;
    gap:12px;
}

button{
    padding:16px;
    border:none;
    border-radius:14px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
    color:white;
}

button:hover{
    transform:scale(1.02);
}

.dyugo button{
    background:#22c55e;
}

.dyugo button:hover{
    background:#16a34a;
}

.boom button{
    background:#a855f7;
}

.boom button:hover{
    background:#9333ea;
}

.status{
    text-align:center;
    margin-bottom:20px;
    font-size:22px;
    font-weight:bold;
    color:#facc15;
}

.closed{
    opacity:0.5;
    pointer-events:none;
}

</style>
</head>

<body>

<div class="container">

<div class="title">
ТАЄМНЕ ОНЛАЙН-ГОЛОСУВАННЯ
</div>

<div class="status" id="status">
Голосування триває
</div>

<!-- ДЮГО -->

<div class="block dyugo" id="dyugoBlock">

<h2>
Президент ДЮГО
</h2>

<div class="buttons">

<button onclick="vote('dyugo',1)">
Марія Деканенко
</button>

<button onclick="vote('dyugo',2)">
Денис Онищенко
</button>

<button onclick="vote('dyugo',3)">
Дар'я Бутенко
</button>

<button onclick="vote('dyugo',4)">
Дар'я Литвин
</button>

<button onclick="vote('dyugo',5)">
Аріна Давиденко
</button>

</div>
</div>

<!-- БУМ -->

<div class="block boom" id="boomBlock">

<h2>
Лідер БУМ
</h2>

<div class="buttons">

<button onclick="vote('boom',1)">
Марія Деканенко
</button>

<button onclick="vote('boom',2)">
Денис Онищенко
</button>

<button onclick="vote('boom',3)">
Дар'я Бутенко
</button>

<button onclick="vote('boom',4)">
Дар'я Литвин
</button>

<button onclick="vote('boom',5)">
Аріна Давиденко
</button>

</div>
</div>

</div>

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="firebase.js"></script>

<script>

/* ID ГОЛОСУЮЧОГО */

let voterId = localStorage.getItem("voterId");

if (!voterId) {

    voterId =
    Date.now()
    + "_"
    + Math.random().toString(36).substring(2);

    localStorage.setItem("voterId", voterId);
}

/* ГОЛОСУВАННЯ */

function vote(category, candidate){

    db.ref("settings/votingOpen")
    .once("value")
    .then(settingSnap => {

        const votingOpen = settingSnap.val();

        if(votingOpen === false){

            alert("Голосування закрито");
            return;
        }

        const otherCategory =
        category === "dyugo"
        ? "boom"
        : "dyugo";

        /* ПЕРЕВІРКА ІНШОЇ КАТЕГОРІЇ */

        db.ref("votes/" + otherCategory + "/" + voterId)
        .once("value")
        .then(otherSnap => {

            const otherVote = otherSnap.val();

            if(otherVote == candidate){

                alert(
                  "Не можна голосувати за одну й ту саму людину у двох категоріях!"
                );

                return;
            }

            /* ПЕРЕВІРКА ПОТОЧНОЇ */

            db.ref("votes/" + category + "/" + voterId)
            .once("value")
            .then(mySnap => {

                if(mySnap.exists()){

                    alert(
                      "Ви вже голосували в цій категорії!"
                    );

                    return;
                }

                /* ЗБЕРЕГТИ ГОЛОС */

                db.ref("votes/" + category + "/" + voterId)
                .set(candidate);

                alert("Голос зараховано!");

            });

        });

    });

}

/* СТАТУС */

db.ref("settings/votingOpen")
.on("value", snap => {

    const open = snap.val();

    const status =
    document.getElementById("status");

    const dyugo =
    document.getElementById("dyugoBlock");

    const boom =
    document.getElementById("boomBlock");

    if(open === false){

        status.innerText =
        "Голосування завершено";

        dyugo.classList.add("closed");
        boom.classList.add("closed");

    }else{

        status.innerText =
        "Голосування триває";

        dyugo.classList.remove("closed");
        boom.classList.remove("closed");
    }

});

</script>

</body>
</html>
