<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ТАЄМНЕ ОНЛАЙН-ГОЛОСУВАННЯ</title>

<style>
body {
  margin: 0;
  font-family: Arial;

  /* 🔥 ФОН */
  background: url("fon.png") center/cover no-repeat fixed;

  color: white;
}

/* контейнер */
.app {
  max-width: 500px;
  margin: auto;
  padding: 15px;
}

/* заголовок */
h2 {
  text-align: center;
  margin-bottom: 20px;
  font-size: 26px;

  /* затемнение текста */
  text-shadow: 0 0 10px rgba(0,0,0,0.7);
}

/* карточки */
.card {
  background: rgba(17, 24, 39, 0.85);
  backdrop-filter: blur(5px);

  padding: 15px;
  border-radius: 15px;
  margin-bottom: 15px;

  border: 1px solid rgba(255,255,255,0.08);
}

/* заголовки категорий */
.card h3 {
  margin: 0 0 15px 0;
  text-align: center;
  font-size: 22px;

  text-shadow: 0 0 10px rgba(0,0,0,0.6);
}

/* варианты */
.option {
  display: block;
  padding: 12px;
  margin: 8px 0;

  background: rgba(31, 41, 55, 0.9);

  border-radius: 10px;
  text-align: center;
  cursor: pointer;
  font-size: 18px;

  transition: 0.2s;
}

.option:hover {
  background: rgba(55, 65, 81, 0.95);
}

/* скрываем radio */
input[type="radio"] {
  display: none;
}

/* выбранный вариант */
input[type="radio"]:checked + label {
  background: #3b82f6;
}

/* кнопка */
button {
  width: 100%;
  padding: 15px;
  font-size: 20px;

  border: none;
  border-radius: 12px;

  background: #22c55e;
  color: white;

  cursor: pointer;
  margin-top: 10px;

  transition: 0.2s;
}

button:hover {
  background: #16a34a;
}
</style>
</head>

<body>

<div class="app">

<h2>🗳 ТАЄМНЕ ОНЛАЙН-ГОЛОСУВАННЯ</h2>

<div class="card">
<h3>Президент ДЮГО</h3>

<input type="radio" name="dyugo" id="d1" value="1">
<label class="option" for="d1">Марія Деканенко</label>

<input type="radio" name="dyugo" id="d2" value="2">
<label class="option" for="d2">Денис Онищенко</label>

<input type="radio" name="dyugo" id="d3" value="3">
<label class="option" for="d3">Дар'я Бутенко</label>

<input type="radio" name="dyugo" id="d4" value="4">
<label class="option" for="d4">Дар'я Литвин</label>

<input type="radio" name="dyugo" id="d5" value="5">
<label class="option" for="d5">Аріна Давиденко</label>

</div>

<div class="card">
<h3>ЛІДЕР БУМ</h3>

<input type="radio" name="boom" id="b1" value="1">
<label class="option" for="b1">Марія Деканенко</label>

<input type="radio" name="boom" id="b2" value="2">
<label class="option" for="b2">Денис Онищенко</label>

<input type="radio" name="boom" id="b3" value="3">
<label class="option" for="b3">Дар'я Бутенко</label>

<input type="radio" name="boom" id="b4" value="4">
<label class="option" for="b4">Дар'я Литвин</label>

<input type="radio" name="boom" id="b5" value="5">
<label class="option" for="b5">Аріна Давиденко</label>

</div>

<button onclick="vote()">Голосувати</button>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="firebase.js"></script>

<script>
let deviceId = localStorage.getItem("deviceId");

if (!deviceId) {
  deviceId = Math.random().toString(36).substring(2) + Date.now();
  localStorage.setItem("deviceId", deviceId);
}

function vote() {

  const dyugo =
    document.querySelector('input[name="dyugo"]:checked');

  const boom =
    document.querySelector('input[name="boom"]:checked');

  if (!dyugo || !boom) {
    alert("Оберіть обидві категорії");
    return;
  }

  const userRef = db.ref("voted/" + deviceId);

  userRef.once("value").then(snapshot => {

    if (snapshot.exists()) {
      alert("Ви вже голосували ❌");
      return;
    }

    db.ref("votes/dyugo").push(dyugo.value);
    db.ref("votes/boom").push(boom.value);

    userRef.set(true);

    alert("Голос зараховано ✅");

  });

}
</script>

</body>
</html>
